<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Ruang Cerita Kita 💖</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Poppins', sans-serif;
    }

    body{
      background: linear-gradient(135deg,#ff9a9e,#fad0c4);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      padding:20px;
    }

    .chat-box{
      width:100%;
      max-width:700px;
      height:90vh;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border-radius:30px;
      overflow:hidden;
      box-shadow:0 10px 40px rgba(0,0,0,0.2);
      display:flex;
      flex-direction:column;
      position:relative;
    }

    .header{
      padding:20px;
      text-align:center;
      color:white;
      font-size:28px;
      font-weight:bold;
      background: rgba(255,255,255,0.1);
      border-bottom:1px solid rgba(255,255,255,0.2);
    }

    .chat-area{
      flex:1;
      overflow-y:auto;
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    .msg{
      max-width:75%;
      padding:15px 18px;
      border-radius:20px;
      line-height:1.6;
      animation:fade 0.4s ease;
      word-wrap:break-word;
    }

    .me{
      align-self:flex-end;
      background:white;
      color:#ff4f81;
      border-bottom-right-radius:5px;
    }

    .her{
      align-self:flex-start;
      background:rgba(255,255,255,0.25);
      color:white;
      border-bottom-left-radius:5px;
    }

    .input-area{
      padding:20px;
      display:flex;
      gap:10px;
      background: rgba(255,255,255,0.08);
    }

    textarea{
      flex:1;
      height:60px;
      border:none;
      outline:none;
      border-radius:18px;
      padding:15px;
      resize:none;
      font-size:15px;
    }

    button{
      border:none;
      padding:0 25px;
      border-radius:18px;
      background:white;
      color:#ff4f81;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      transform:scale(1.05);
      background:#ffe3ec;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(10px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .love{
      position:absolute;
      color:white;
      animation:love 5s linear infinite;
      opacity:0.6;
      z-index:-1;
    }

    @keyframes love{
      0%{
        transform:translateY(0) rotate(0deg);
        opacity:1;
      }
      100%{
        transform:translateY(-100vh) rotate(360deg);
        opacity:0;
      }
    }

  </style>
</head>

<body>

  <div class="chat-box">

    <div class="header">
      Ruang Cerita Kita 💕
    </div>

    <div class="chat-area" id="chatArea">

      <div class="msg her">
        Haiii ✨  
        Kamu bisa cerita apa aja di sini 💖
      </div>

    </div>

    <div class="input-area">

      <textarea
        id="pesan"
        placeholder="Tulis cerita kamu di sini..."
      ></textarea>

      <button onclick="kirimPesan()">
        Kirim 💌
      </button>

    </div>

  </div>

  <script>

    const chatArea = document.getElementById("chatArea");

    function kirimPesan(){

      const pesan = document.getElementById("pesan");

      if(pesan.value.trim() === ""){
        return;
      }

      // PESAN KAMU
      const bubble = document.createElement("div");
      bubble.classList.add("msg","me");
      bubble.innerText = pesan.value;

      chatArea.appendChild(bubble);

      // AUTO SCROLL
      chatArea.scrollTop = chatArea.scrollHeight;

      // SIMPAN PESAN

</body>
</html>
